# Process graph WITHOUT RLAgent node (for training Workflow Designer to insert agent).
# Same as temperature_process.yaml but RLAgent unit and all agent-related connections removed.
# Use as example of an "imported flow" that the assistant should augment by adding the agent and wiring.
environment_type: thermodynamic
units:
  - id: hot_source
    type: Source
    controllable: false
    params:
      temp: 60.0
      max_flow: 1.0
  - id: cold_source
    type: Source
    controllable: false
    params:
      temp: 10.0
      max_flow: 1.0
  - id: mixer_tank
    type: Tank
    controllable: false
    params:
      capacity: 1.0
      cooling_rate: 0.01
  - id: hot_valve
    type: Valve
    controllable: true
    params: {}
  - id: cold_valve
    type: Valve
    controllable: true
    params: {}
  - id: dump_valve
    type: Valve
    controllable: true
    params: {}
  - id: thermometer_hot
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: thermometer_cold
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: thermometer_tank
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: water_level
    type: Sensor
    controllable: false
    params:
      measure: volume
connections:
  - from: hot_source
    to: thermometer_hot
  - from: thermometer_hot
    to: hot_valve
  - from: hot_valve
    to: mixer_tank
  - from: cold_source
    to: thermometer_cold
  - from: thermometer_cold
    to: cold_valve
  - from: cold_valve
    to: mixer_tank
  - from: mixer_tank
    to: dump_valve
  - from: mixer_tank
    to: thermometer_tank
  - from: mixer_tank
    to: water_level
