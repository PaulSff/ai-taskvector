# Training config: AI data smart filter (Node-RED) — TRAINING via /step
#
# For training: deploy the STEP flow (smart_filter_node_red_step.json) which exposes POST /step
# (reset/action → observation, reward, done). Episode: 100 synthetic offers; agent includes/discards
# per offer; reward at end = -mean(price) + bonus for ~20 selected. Obs: 4 dims, action: 1 dim.
#
# For inference: use the WIRED flow (smart_filter_node_red_wired.json) and POST /filter with response.json.
environment:
  source: external
  adapter: node_red
  adapter_config:
    step_url: "http://127.0.0.1:1880/step"
    timeout: 10
    observation_spec:
      - name: price_norm
      - name: duration_norm
      - name: stops_norm
      - name: index_norm
    action_spec:
      - name: include
        min: 0.0
        max: 1.0
goal:
  type: selection
rewards:
  preset: goal_reaching
  weights: {}
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 1
  randomize_params: false
  verbose: 1
  test_episodes: 5
callbacks:
  model_dir: "models/node-red_AI_data-smart-filter"
  eval_freq: 5000
  save_freq: 10000
  name_prefix: "ppo_filter"
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
