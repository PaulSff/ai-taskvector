# Training config: AI data smart filter (Node-RED roundtrip)
#
# Use case: large response (e.g. 200_000 flight offers) → RL Agent selects best 200 → response_filtered.json
# This flow is for DEPLOYMENT (inference). Training a filter/selection agent requires a custom environment
# that simulates offers and rewards (e.g. relevance, diversity, price); that env is not included in this
# repo yet. When available: set environment.source to custom and environment.type to the filter env.
#
# For Node-RED roundtrip: deploy the WIRED flow and call POST /filter with body = response.json.
# The RL Agent node in the flow should load the trained model and output selected indices or filtered data.
environment:
  source: external
  adapter: node_red
  adapter_config:
    # Filter endpoint (for inference/serve). Training would use a custom filter env.
    step_url: "http://127.0.0.1:1880/filter"
    # timeout: 30
goal:
  type: selection
  # target_selection_count: 200
  # target_metrics: [ "relevance", "diversity", "price" ]
rewards:
  preset: goal_reaching
  weights: {}
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 1
  randomize_params: false
  verbose: 1
  test_episodes: 5
callbacks:
  model_dir: "models/node-red_AI_data-smart-filter"
  eval_freq: 5000
  save_freq: 10000
  name_prefix: "ppo_filter"
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
