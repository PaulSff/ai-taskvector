# Training config: custom env (env_factory / thermodynamic)
# Uses in-process TemperatureControlEnv built from the process graph.
# No Node-RED or PyFlow; process_graph_path points to the wired YAML in this folder.
environment:
  source: custom
  type: thermodynamic
  process_graph_path: "config/examples/custom_runtime_factory/custom_AI_temperature-control-agent/temperature_process.yaml"
goal:
  type: setpoint
  target_temp: 37.0
  target_volume_ratio: [0.80, 0.85]
rewards:
  preset: temperature_and_volume
  weights:
    temp_error: -1.0
    volume_in_range: 10.0
    dumping: -0.1
    step_penalty: -0.001
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 4
  randomize_params: true
  verbose: 1
  test_episodes: 5
callbacks:
  model_dir: "models/custom_AI_temperature-control-agent"
  eval_freq: 5000
  save_freq: 10000
  name_prefix: "ppo_custom"
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
