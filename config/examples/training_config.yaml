# Canonical training config: temperature control (no hardcoded values in train.py)
goal:
  type: setpoint
  target_temp: 37.0
  target_volume_ratio: [0.80, 0.85]
rewards:
  preset: temperature_and_volume
  weights:
    temp_error: -1.0
    volume_in_range: 10.0
    dumping: -0.1
    step_penalty: -0.001
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 4
  randomize_params: true
  verbose: 1
  test_episodes: 5
callbacks:
  eval_freq: 5000
  save_freq: 10000
  save_path: "./models/checkpoints/"
  name_prefix: "ppo_temp_control"
  best_model_save_path: "./models/best/"
  log_path: "./logs/eval/"
  tensorboard_log: "./logs/tensorboard/"
  final_model_save_path: "./models/ppo_temperature_control_final"
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
