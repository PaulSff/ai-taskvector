# Canonical training config: temperature control (no hardcoded values in train.py)
# Optional: which runtime to use (default: custom thermodynamic). Stored in training_config_used.yaml per model.
# environment:
#   source: custom          # custom | external | gymnasium
#   type: thermodynamic     # for custom
#   process_graph_path: null
#   adapter: null           # for external: node_red, edgelinkd, pyflow, idaes
#   adapter_config: {}      # e.g. node_red_url, observation_sources, action_targets
#   env_id: null            # for gymnasium
#   env_kwargs: {}
goal:
  type: setpoint
  target_temp: 37.0
  target_volume_ratio: [0.80, 0.85]
rewards:
  preset: temperature_and_volume
  weights:
    temp_error: -1.0
    volume_in_range: 10.0
    dumping: -0.1
    step_penalty: -0.001
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 4
  randomize_params: true
  verbose: 1
  test_episodes: 5
# All model/checkpoint/log paths under one agent folder (optional; omit for flat models/)
callbacks:
  model_dir: "models/temperature-control-agent"
  eval_freq: 5000
  save_freq: 10000
  name_prefix: "ppo_temp_control"
  # Paths are derived: checkpoints/, best/, logs/eval/, logs/tensorboard/, <name_prefix>_final
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
