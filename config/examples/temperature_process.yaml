# Canonical process graph: temperature mixing (matches current TemperatureControlEnv)
environment_type: thermodynamic
units:
  - id: hot_source
    type: Source
    controllable: false
    params:
      temp: 60.0
      max_flow: 1.0
  - id: cold_source
    type: Source
    controllable: false
    params:
      temp: 10.0
      max_flow: 1.0
  - id: mixer_tank
    type: Tank
    controllable: false
    params:
      capacity: 1.0
      cooling_rate: 0.01
  - id: hot_valve
    type: Valve
    controllable: true
    params: {}
  - id: cold_valve
    type: Valve
    controllable: true
    params: {}
  - id: dump_valve
    type: Valve
    controllable: true
    params: {}
  - id: thermometer_hot
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: thermometer_cold
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: thermometer_tank
    type: Sensor
    controllable: false
    params:
      measure: temperature
  - id: water_level
    type: Sensor
    controllable: false
    params:
      measure: volume
  - id: rl_agent
    type: RLAgent
    controllable: false
    params: {}
connections:
  - from: hot_source
    to: thermometer_hot
  - from: hot_source
    to: mixer_tank
    to_port: hot_temp
  - from: thermometer_hot
    to: hot_valve
  - from: hot_valve
    to: mixer_tank
    to_port: hot_flow
  - from: cold_source
    to: thermometer_cold
  - from: cold_source
    to: mixer_tank
    to_port: cold_temp
  - from: thermometer_cold
    to: cold_valve
  - from: cold_valve
    to: mixer_tank
    to_port: cold_flow
  - from: dump_valve
    to: mixer_tank
    to_port: dump_flow
  - from: mixer_tank
    to: thermometer_tank
  - from: mixer_tank
    to: water_level
    from_port: volume_ratio
  # RLAgent inputs (observations)
  - from: thermometer_hot
    to: rl_agent
  - from: thermometer_cold
    to: rl_agent
  - from: thermometer_tank
    to: rl_agent
  - from: water_level
    to: rl_agent
  # RLAgent outputs (actions)
  - from: rl_agent
    to: hot_valve
  - from: rl_agent
    to: cold_valve
  - from: rl_agent
    to: dump_valve
