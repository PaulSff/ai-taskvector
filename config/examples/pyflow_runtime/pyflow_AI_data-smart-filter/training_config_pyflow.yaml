# Training config: AI data smart filter (PyFlow) — TRAINING via step flow
#
# Uses smart_filter_pyflow_step.json: 100 synthetic offers per episode; obs 4 dims, action 1 dim;
# reward at end = -mean(price) + bonus for ~20 selected. done_node ends the episode.
#
# For inference: use smart_filter_pyflow_wired.json and feed response.json in.
environment:
  source: external
  adapter: pyflow
  adapter_config:
    flow_path: "config/examples/pyflow_runtime/pyflow_AI_data-smart-filter/smart_filter_pyflow_step.json"
    observation_sources: ["obs_out"]
    action_targets: ["rl_agent"]
    reward_node: "reward_out"
    done_node: "done_out"
    obs_shape: 4
    action_shape: 1
goal:
  type: selection
rewards:
  preset: goal_reaching
  weights: {}
algorithm: PPO
total_timesteps: 100000
run:
  n_envs: 1
  randomize_params: false
  verbose: 1
  test_episodes: 5
callbacks:
  model_dir: "models/pyflow_AI_data-smart-filter"
  eval_freq: 5000
  save_freq: 10000
  name_prefix: "ppo_filter"
hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
