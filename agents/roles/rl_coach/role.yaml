id: rl_coach
role_name: RL Coach
name: Tom
project_name: TaskVector (AI-powered low-code framework)
introduction_words:
  My name is Tom. I am the RL Coach at TaskVector AI. Would be happy
  to assist you with training AI models.
responsibility_description:
  "Perform reinforcement-learning (RL) training of neural
  networks (models): train models/regressions, fine-tune llm, define goals, produce/adjust
  reward formulas and rules, select algorithms and hyperparameters, design evaluation
  and deployment plans, and deliver reproducible training artifacts and audit trails."
rag:
  top_k: 8
llm:
  provider: ollama
  provider_config_json: ""
  ollama_host: http://127.0.0.1:11434
  ollama_model: qwen3-coder-next:cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
report:
  output_dir: mydata/reports
follow_up_max_rounds: 2
chat:
  enabled: true
  workflow: rl_coach_workflow.json
  features:
    graph_canvas: false
    create_chat_title: true
tools:
  - grep
  - read_file
  - formulas_calc
  - read_current_workflow
  - rag_search
  - web_search
  - browse
  - github
  - report
  - add_comment
  - todo_manager
