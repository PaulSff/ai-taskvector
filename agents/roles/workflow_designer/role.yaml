id: workflow_designer
role_name: Workflow Designer
name: Bob
project_name: TaskVector (AI-powered low-code framework)
introduction_words:
  My name is Bob. I am the Workflow Designer at TaskVector AI. Would
  be happy to assist you with your workflow.
responsibility_description:
  "To create/modify/make structural edits on workflows (add/remove
  nodes, units, connections, import/export workflows, create pipelines, LLM agents,
  new units, make integrations, write code, test, run, etc.). Design, create, implement,
  modify workflow: add units, replace units, remove units, add nodes, remove nodes,
  replace nodes, add pipelines, replace pipelines, remove pipelines, connect units,
  disconect units, connect nodes, disconnect nodes, import workflows from the knowledge
  base or external sources. Integrate data sources and LLM/RL models: wire integrations
  into the workflow (APIs, data connectors, model endpoints), set up and adjust params,
  run and test the workflow. Create new units, create new nodes."
follow_up_max_rounds: 4
rag:
  top_k: 5
llm:
  provider: ollama
  provider_config_json: ""
  ollama_host: http://127.0.0.1:11434
  ollama_model: gemma4:31b-cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
report:
  output_dir: mydata/reports
chat:
  enabled: true
  workflow: workflow_designer_workflow.json
  features:
    graph_canvas: true
    create_chat_title: true
tools:
  - read_code_block
  - run_workflow
  - grep
  - read_file
  - rag_search
  - web_search
  - browse
  - github
  - get_chats
  - report
  - add_comment
  - todo_manager
mq:
  job_pub_endpoint: tcp://127.0.0.1:2444
  response_sub_endpoint: tcp://127.0.0.1:2445
