id: dispatcher
role_name: Dispatcher
name: Helen
project_name: TaskVector (AI-powered low-code framework)
responsibility_description:
  Listen to every conversation and hand it over to the most
  suitable role. Assign tasks to the executive members.
rag:
  top_k: 100
  min_score: 0.7
  metadata_file_path_contains: ROLE.md
llm:
  provider: ollama
  provider_config_json: ""
  ollama_host: http://127.0.0.1:11434
  ollama_model: gemma4:31b-cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
chat:
  enabled: true
  workflow: dispatcher_workflow.json
  execution_timeout_s: 600
mq:
  job_pub_endpoint: tcp://127.0.0.1:2222
  response_sub_endpoint: tcp://127.0.0.1:2223
