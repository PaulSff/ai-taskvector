<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Process graph</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/reactflow@10/dist/umd/index.min.js" crossorigin></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #root { width: 100%; height: 100vh; }
    .react-flow__node { padding: 8px 12px; border-radius: 6px; font-size: 12px; }
    .react-flow__node.default { background: #f0f4f8; border: 1px solid #cbd5e0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useCallback, useEffect, useState } = React;
    const { ReactFlow, Controls, Background, useNodesState, useEdgesState } = window.ReactFlow;

    function FlowCanvas() {
      const [nodes, setNodes, onNodesChange] = useNodesState([]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([]);

      const loadGraph = useCallback(async () => {
        try {
          const res = await fetch('/graph');
          const data = await res.json();
          if (data && Array.isArray(data.nodes) && Array.isArray(data.edges)) {
            setNodes(data.nodes);
            setEdges(data.edges);
          }
        } catch (e) {
          console.warn('Failed to load graph:', e);
        }
      }, [setNodes, setEdges]);

      useEffect(function () { loadGraph(); }, [loadGraph]);

      return React.createElement(
        React.Fragment,
        null,
        React.createElement(ReactFlow, {
          nodes: nodes,
          edges: edges,
          onNodesChange: onNodesChange,
          onEdgesChange: onEdgesChange,
          fitView: true,
          nodesDraggable: true,
          nodesConnectable: false,
          elementsSelectable: true,
        }),
        React.createElement(Controls, null),
        React.createElement(Background, { variant: 'dots', gap: 12, size: 1 })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(FlowCanvas));
  </script>
</body>
</html>
