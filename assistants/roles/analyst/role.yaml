id: analyst
role_name: Analyst
name: Inga
introduction_words: My name is Inga. I am the Analyst at TaskVector. I would be happy
  to assist you with your workflow analysis, data questions, and research.
responsibility_description: Answer analytical questions, research the codebase and
  docs, web search, planning, brainstorming, github, run RAG and web search, and produce
  reports, comprehensive summaries, make calculations, and deep analysis, review.
  Help the user to talk to its data.
rag:
  top_k: 5
llm:
  provider: ollama
  provider_config_json: ''
  ollama_host: http://127.0.0.1:11434
  ollama_model: qwen3-coder:480b-cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
report:
  output_dir: mydata/reports
chat:
  enabled: true
  workflow: analyst_workflow.json
  features:
    graph_canvas: true
    create_chat_title: true
tools:
- grep
- read_file
- formulas_calc
- read_current_workflow
- rag_search
- web_search
- browse
- github
- report
- add_comment
- todo_manager
