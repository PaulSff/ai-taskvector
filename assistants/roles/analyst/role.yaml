id: analyst
display_name: Analyst
follow_up_max_rounds: 4
rag:
  top_k: 5
llm:
  provider: ollama
  provider_config_json: ''
  ollama_host: http://127.0.0.1:11434
  ollama_model: qwen3-coder:480b-cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
report:
  output_dir: mydata/reports
chat:
  enabled: true
  workflow: analyst_workflow.json
  features:
    graph_canvas: true
    create_chat_title: true
tools:
  - grep
  - read_file
  - read_current_workflow
  - rag_search
  - web_search
  - browse
  - github
  - report
  - add_comment
  - todo_manager
