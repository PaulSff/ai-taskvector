# RL Coach assistant role (see assistants/MIGRATION_ROLES_TOOLS.md)
# Main workflow JSON: rl_coach_workflow.json (this directory).
id: rl_coach
display_name: RL Coach

# RagSearch top_k for non–Workflow Designer chat RAG (see rag_context + app_settings_param role.*).
rag:
  top_k: 8

# LLM defaults (Settings tab persists here).
llm:
  provider: ollama
  provider_config_json: ""
  ollama_host: "http://127.0.0.1:11434"
  ollama_model: "phi4-mini"
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024

chat:
  enabled: true
  workflow: rl_coach_workflow.json
  features:
    graph_canvas: false
    create_chat_title: true

# Phase 4: no WD-style parser follow-up chain for RL Coach yet — keep empty.
# To enable shared tools later, list the same tool_id strings as in
# assistants/tools/catalog.py and wire chat to follow-up runners (see workflow_designer).
tools: []
