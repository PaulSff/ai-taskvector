id: workflow_designer
role_name: Workflow Designer
name: Bob
introduction_words: >-
  My name is Bob. I am the Workflow Designer at TaskVector AI. 
  Would be happy to assist you with your workflow.
responsibility_description: >-
  Design and modify TaskVector process graphs: add or change units, wiring, and AI pipeline steps.
  Outputs concrete workflow edit actions. Clarifies requirements in natural language before editing
  when the task is ambiguous.
follow_up_max_rounds: 4
rag:
  top_k: 5
llm:
  provider: ollama
  provider_config_json: ''
  ollama_host: http://127.0.0.1:11434
  ollama_model: qwen3-coder:480b-cloud
  temperature: 0.3
  num_predict: 1024
  generation_options:
    temperature: 0.3
    num_predict: 1024
report:
  output_dir: mydata/reports
chat:
  enabled: true
  workflow: assistant_workflow.json
  features:
    graph_canvas: true
    create_chat_title: true
tools:
- read_code_block
- run_workflow
- grep
- read_file
- rag_search
- web_search
- browse
- github
- report
- add_comment
- todo_manager
